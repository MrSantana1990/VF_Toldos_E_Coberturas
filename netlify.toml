[build]
command = "pnpm build"
publish = "dist/public"

[build.environment]
NODE_VERSION = "20"
PNPM_VERSION = "10.4.1"

[functions]
directory = "netlify/functions"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
